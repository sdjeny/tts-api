# ============================================================
# TTS API 配置文件
# ============================================================
#
# 切换模型：修改 model.active 即可，无需重启以外的任何操作
#   custom_voice — Qwen3-TTS CustomVoice（预设音色，甜美女声等）
#   base         — Qwen3-TTS Base（Voice Clone，需先注册自定义音色）
#   kokoro       — Kokoro-82M（轻量级，中英双语）
#
# ============================================================

model:
  # 当前激活模型：custom_voice | base | kokoro
  active: custom_voice

  # Qwen3-TTS 模型路径（custom_voice 和 base 共用或分别指定）
  # 容器内路径，通过 docker-compose volumes 挂载到 /models
  model_path: "/models/Qwen3-TTS-12Hz-1.7B-CustomVoice"

  # 设备与精度
  device_map: "cpu"        # cpu / cuda:0 等
  torch_dtype: "float32"   # float16 / float32 / bfloat16

  # Kokoro 专用（当 active=kokoro 时使用）
  # 语言代码：en/zh/ja/es/fr/hi/it/pt/en-gb
  lang_code: "en"

server:
  host: "0.0.0.0"
  port: 8420

output:
  base_dir: "/audio"       # 容器内路径（挂载到 /audio）

voice_clones:
  dir: "/clones"           # 容器内路径（挂载到 /clones）

# tts_client.py 使用的默认地址
api:
  base_url: "http://localhost:8420"
